<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ateliê 27 - Brigadeiros</title>

<link href="https://fonts.googleapis.com/css2?family=Sirenik:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#F2E9D8;
    font-family:'Sirenik', serif;
    color:#3A332C;
}

.container{
    width:90%;
    max-width:1300px;
    margin:auto;
    padding:60px 0;
}

/* LOGO */
.logo-animada{
    display:flex;
    justify-content:center;
    margin-bottom:30px;
    opacity:0;
    transform:translateY(40px);
    transition:0.8s ease;
}

.logo-animada.show{
    opacity:1;
    transform:translateY(0);
}

.logo-animada img{
    width:200px;
    height:auto;
}

@media(max-width:768px){
    .logo-animada img{
        width:150px;
    }
}

h1{
    text-align:center;
    font-size:58px;
    margin-bottom:50px;
    font-weight:700;
}

/* GRID */
.menu{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:40px;
}

@media (max-width:1024px){
    .menu{
        grid-template-columns:repeat(2, 1fr);
    }
}

@media (max-width:768px){
    .menu{
        grid-template-columns:1fr;
    }

    h1{
        font-size:40px;
    }
}

/* CARDS */
.card{
    background:#FAF4E8;
    border-radius:25px;
    padding:25px;
    box-shadow:0 15px 40px rgba(0,0,0,0.05);
    transition:0.4s ease;
    display:flex;
    flex-direction:column;
    opacity:0;
    transform:translateY(40px);
}

.card.show{
    opacity:1;
    transform:translateY(0);
}

.card:hover{
    transform:translateY(-8px);
    box-shadow:0 25px 60px rgba(0,0,0,0.08);
}

.card img{
    width:100%;
    height:230px;
    object-fit:cover;
    border-radius:18px;
    margin-bottom:20px;
    transition:0.4s ease;
}

.card:hover img{
    transform:scale(1.05);
}

.card h2{
    font-size:26px;
    margin-bottom:15px;
}

.descricao{
    font-size:18px;
    line-height:1.6;
    margin-bottom:20px;
}

button{
    background:#C7A247;
    color:#482813;
    border:none;
    padding:12px 22px;
    border-radius:30px;
    font-family:'Sirenik', serif;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#4b280a;
    color:#FFFFFF;
}

.valores{
    display:none;
    margin-top:20px;
    font-size:17px;
}

.valores p{
    display:flex;
    justify-content:space-between;
    border-bottom:1px dashed #D5C3A1;
    padding:8px 0;
    margin:0;
}

.card.active .valores{
    display:block;
}

</style>
</head>

<body>

<div class="container">

<div class="logo-animada">
    <img src="logo.png" alt="Logo Ateliê 27">
</div>

<h1>Brigadeiros</h1>

<div class="menu">

<div class="card">
<img src="tradicional.jpg">
<h2>Tradicional</h2>
<div class="descricao">Chocolate 50% cacau, textura cremosa e finalização premium.</div>
<button onclick="toggleCard(this)">Ver Valores</button>
<div class="valores">
<p><span>Unidade</span><span>R$2,50</span></p>
</div>
</div>

<div class="card">
<img src="coco.jpg">
<h2>Beijinho</h2>
<div class="descricao">Leite condensado e coco selecionado.</div>
<button onclick="toggleCard(this)">Ver Valores</button>
<div class="valores">
<p><span>Unidade</span><span>R$2,50</span></p>
</div>
</div>

</div>
</div>

<script>

/* Abrir e fechar valores */
function toggleCard(button){
    const card = button.parentElement;
    card.classList.toggle("active");

    button.innerText = card.classList.contains("active") 
        ? "Ocultar Valores" 
        : "Ver Valores";
}

/* Observer para animação */
const elements = document.querySelectorAll(".card, .logo-animada");

const observer = new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
        if(entry.isIntersecting){
            entry.target.classList.add("show");
        } else {
            entry.target.classList.remove("show");
        }
    });
},{
    threshold:0.25
});

elements.forEach(el=>{
    observer.observe(el);
});

</script>

</body>
</html>
