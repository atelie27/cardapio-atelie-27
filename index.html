<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ateliê 27 - Brigadeiros</title>

<link href="https://fonts.googleapis.com/css2?family=Sirenik:wght@400;700&display=swap" rel="stylesheet">

<style>

*{ box-sizing:border-box; }

body{
margin:0;
background:#F2E9D8;
font-family:'Sirenik', serif;
color:#3A332C;
}

/* ANIMAÇÕES */

.reveal{
opacity:0;
transform:translateY(60px);
transition:all .9s cubic-bezier(.17,.67,.34,1);
}

.reveal.visible{
opacity:1;
transform:translateY(0);
}

.container{
width:90%;
max-width:1300px;
margin:auto;
padding:60px 0;
}

/* HERO */

.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.hero-content img{
width:450px;
margin-bottom:25px;
}

.linha-dourada{
width:120px;
height:2px;
background:#C7A247;
margin:20px auto 30px auto;
}

.btn-hero{
background:#C7A247;
color:#482813;
border:none;
padding:14px 32px;
border-radius:40px;
font-family:'Sirenik', serif;
font-size:18px;
cursor:pointer;
transition:all .3s;
}

.btn-hero:hover{
transform:scale(1.05);
}

/* TITULOS */

.section-title{
text-align:center;
font-size:58px;
margin:80px 0 10px 0;
}

.category-title{
text-align:center;
font-size:36px;
margin:60px 0 30px 0;
}

/* GRID */

.menu{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:40px;
align-items:stretch;
}

@media(max-width:1024px){
.menu{ grid-template-columns:1fr 1fr; }
}

@media(max-width:768px){
.menu{ grid-template-columns:1fr; }
.section-title{ font-size:38px;}
.category-title{ font-size:26px;}
}

/* CARDS */

.card{
background:#FAF4E8;
border-radius:25px;
padding:25px;
box-shadow:0 15px 40px rgba(0,0,0,0.05);
display:flex;
flex-direction:column;
height:100%;
transition:transform .35s, box-shadow .35s;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 25px 60px rgba(0,0,0,0.08);
}

/* CARROSSEL */

.carousel{
position:relative;
width:100%;
height:300px;
overflow:hidden;
border-radius:18px;
margin-bottom:20px;
}

.carousel-images{
display:flex;
transition:transform .4s ease;
height:100%;
}

.carousel-images img{
width:100%;
height:300px;
object-fit:cover;
flex-shrink:0;
}

.carousel button{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(0,0,0,0.4);
color:white;
border:none;
font-size:22px;
padding:8px 12px;
cursor:pointer;
border-radius:50%;
}

.prev{ left:10px; }
.next{ right:10px; }

.carousel button:hover{
background:rgba(0,0,0,0.6);
}

.card h2{
font-size:24px;
margin-bottom:10px;
}

.descricao{
font-size:17px;
line-height:1.5;
flex-grow:1;
margin-bottom:15px;
}

.valor-unit{
font-size:18px;
font-weight:bold;
color:#4b280a;
margin-top:auto;
}

/* RESTO DO SEU CSS (mantido igual) */

.info-section{
padding:90px 0 50px 0;
background:linear-gradient(to bottom,#F2E9D8,#EFE4CF);
}

.info-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:30px;
margin-top:40px;
}

.info-card{
background:#FAF4E8;
padding:35px 25px;
border-radius:25px;
box-shadow:0 15px 40px rgba(0,0,0,0.04);
text-align:center;
transition:transform .35s, box-shadow .35s;
}

.info-card:hover{
transform:translateY(-6px);
box-shadow:0 20px 50px rgba(0,0,0,0.06);
}

.contact-section{
padding:70px 0 110px 0;
background:#EFE4CF;
text-align:center;
}

.contact-info p{
font-size:20px;
margin:8px 0;
}

.whatsapp-btn{
display:inline-block;
margin-top:25px;
background:#25D366;
color:white;
padding:14px 30px;
border-radius:40px;
font-size:18px;
text-decoration:none;
transition:all .3s;
}

.whatsapp-btn:hover{
transform:scale(1.05);
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

</style>
</head>

<body>

<div class="container">

<section class="hero reveal">
<div class="hero-content">
<img src="logo.png">
<div class="linha-dourada"></div>
<button class="btn-hero" onclick="scrollToMenu()">Ver Cardápio</button>
</div>
</section>

<h1 id="menu" class="section-title reveal">Brigadeiros</h1>
<div class="linha-dourada"></div>

<h2 class="category-title reveal">Tradicionais</h2>

<div class="menu">

<div class="card reveal">
<div class="carousel">
<div class="carousel-images">
<img src="tradicional.png">
<img src="tradicional2.png">
<img src="tradicional3.png">
</div>
<button class="prev">&#10094;</button>
<button class="next">&#10095;</button>
</div>
<h2>Tradicional</h2>
<div class="descricao">Chocolate 50% cacau com granulado macio.</div>
<div class="valor-unit">R$ 2,80 / unidade</div>
</div>

<div class="card reveal">
<div class="carousel">
<div class="carousel-images">
<img src="casadinho.jpg">
<img src="casadinho2.jpg">
</div>
<button class="prev">&#10094;</button>
<button class="next">&#10095;</button>
</div>
<h2>Casadinho</h2>
<div class="descricao">Brigadeiro tradicional com leite em pó.</div>
<div class="valor-unit">R$ 3,00 / unidade</div>
</div>

<div class="card reveal">
<div class="carousel">
<div class="carousel-images">
<img src="coco.jpg">
<img src="coco2.jpg">
</div>
<button class="prev">&#10094;</button>
<button class="next">&#10095;</button>
</div>
<h2>Beijinho</h2>
<div class="descricao">Leite condensado com coco selecionado.</div>
<div class="valor-unit">R$ 3,10 / unidade</div>
</div>

</div>

</div>

<script>

function scrollToMenu(){
document.getElementById("menu").scrollIntoView({behavior:"smooth"});
}

const reveals = document.querySelectorAll(".reveal");

const observer = new IntersectionObserver((entries)=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.classList.add("visible");
}else{
entry.target.classList.remove("visible");
}
});
},{threshold:0.15});

reveals.forEach(el=>{
observer.observe(el);
});

/* CARROSSEL */

document.querySelectorAll(".carousel").forEach(carousel => {
const images = carousel.querySelector(".carousel-images");
const total = images.children.length;
let index = 0;

carousel.querySelector(".next").addEventListener("click", () => {
index = (index + 1) % total;
images.style.transform = `translateX(-${index * 100}%)`;
});

carousel.querySelector(".prev").addEventListener("click", () => {
index = (index - 1 + total) % total;
images.style.transform = `translateX(-${index * 100}%)`;
});
});

</script>

</body>
</html>
