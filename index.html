<!DOCTYPE html>
<!-- Define que o documento é HTML5 -->

<html lang="pt-br">
<!-- Define o idioma da página como português do Brasil -->

<head>
<meta charset="UTF-8">
<!-- Permite acentuação correta (Ateliê, Maracujá etc) -->

<title>Ateliê 27 - Brigadeiros</title>
<!-- Título que aparece na aba do navegador -->

<!-- Importa a fonte Sirenik do Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Sirenik:wght@400;700&display=swap" rel="stylesheet">

<style>

/* Aplica box-sizing para todos os elementos
   Faz com que padding e bordas não aumentem o tamanho total */
*{
    box-sizing:border-box;
}

/* Estilização geral do corpo da página */
body{
    margin:0; /* Remove margens padrão do navegador */
    background:#F2E9D8; /* Cor creme de fundo */
    font-family:'Sirenik', serif; /* Define a fonte principal */
    color:#3A332C; /* Cor padrão do texto */
}

/* Container principal que centraliza o conteúdo */
.container{
    width:90%; /* Ocupa 90% da largura da tela */
    max-width:1300px; /* Limite máximo em telas grandes */
    margin:auto; /* Centraliza horizontalmente */
    padding:60px 0; /* Espaçamento interno vertical */
}

/* Estilo do título principal */
h1{
    text-align:center; /* Centraliza o texto */
    font-size:50px; /* Tamanho grande */
    margin-bottom:50px; /* Espaço abaixo do título */
    font-weight:700; /* Deixa em negrito */
}

/* Layout em grid para organizar os cards */
.menu{
    display:grid; /* Ativa sistema de grade */
    grid-template-columns:repeat(auto-fit, minmax(300px,1fr));
    /* Cria colunas automáticas com mínimo de 300px */
    gap:40px; /* Espaçamento entre os cards */
}

/* Estilo visual de cada card */
.card{
    background:#FAF4E8; /* Cor um pouco mais clara que o fundo */
    border-radius:25px; /* Bordas arredondadas premium */
    padding:30px; /* Espaço interno */
    box-shadow:0 15px 40px rgba(0,0,0,0.05);
    /* Sombra suave elegante */
    transition:0.3s ease; /* Animação suave */
    display:flex;
    flex-direction:column; /* Organiza elementos em coluna */
    justify-content:space-between;
}

/* Efeito ao passar o mouse */
.card:hover{
    transform:translateY(-8px); /* Sobe levemente */
    box-shadow:0 25px 60px rgba(0,0,0,0.08);
}

/* Título do sabor */
.card h2{
    font-size:26px;
    margin-bottom:15px;
}

/* Texto descritivo */
.descricao{
    font-size:18px;
    line-height:1.5; /* Espaçamento entre linhas */
    margin-bottom:20px;
}

/* Estilo do botão */
button{
    background:#C7A247; /* Dourado */
    border:none; /* Remove borda padrão */
    padding:12px 22px; /* Espaçamento interno */
    border-radius:30px; /* Botão arredondado */
    font-family:'Sirenik', serif;
    font-size:16px;
    cursor:pointer; /* Cursor de clique */
    transition:0.3s; /* Animação suave */
}

/* Efeito hover no botão */
button:hover{
    background:#B89134; /* Dourado mais escuro */
}

/* Valores começam escondidos */
.valores{
    display:none;
    margin-top:20px;
    font-size:17px;
}

/* Cada linha de preço */
.valores p{
    display:flex;
    justify-content:space-between;
    /* Espaça nome e preço */
    border-bottom:1px dashed #D5C3A1;
    /* Linha pontilhada elegante */
    padding:8px 0;
    margin:0;
}

/* Quando o card estiver ativo, mostra os valores */
.card.active .valores{
    display:block;
}

/* Responsividade para celular */
@media(max-width:768px){
    h1{
        font-size:40px; /* Reduz tamanho do título */
    }
}

</style>
</head>

<body>

<!-- Container principal -->
<div class="container">

<h1>Nossos Sabores</h1>

<!-- Área que contém todos os cards -->
<div class="menu">

<!-- EXEMPLO DE UM CARD (os outros seguem o mesmo padrão) -->

<div class="card">
<h2>Tradicional</h2>

<div class="descricao">
Chocolate 50% cacau, textura cremosa e finalização premium com granulado refinado.
</div>

<!-- Botão que ativa a função JavaScript -->
<button onclick="toggleCard(this)">Ver Valores</button>

<!-- Área que contém os preços -->
<div class="valores">
<p><span>Unidade</span><span>R$2,50</span></p>
<p><span>25 unidades</span><span>R$65,00</span></p>
<p><span>50 unidades</span><span>R$95,00</span></p>
<p><span>100 unidades</span><span>R$180,00</span></p>
</div>

</div>

<!-- Os demais cards seguem a mesma estrutura -->

</div>
</div>

<!-- JavaScript -->
<script>

/* Função que abre e fecha os valores */
function toggleCard(button){

    const card = button.parentElement;
    /* Seleciona o card pai do botão clicado */

    card.classList.toggle("active");
    /* Adiciona ou remove a classe active */

    button.innerText = card.classList.contains("active") 
        ? "Ocultar Valores" 
        : "Ver Valores";
    /* Altera o texto do botão dinamicamente */
}

</script>

</body>
</html>
